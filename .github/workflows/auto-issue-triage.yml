name: Auto Issue Triage

on:
  issues:
    types: [labeled]

# Elevated permissions needed for the fix+PR path (commit, push, create PR).
# The needs-info path only uses issues: write, but splitting into separate
# jobs would add complexity without meaningful security benefit since this
# only triggers on maintainer-applied labels.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.event.label.name == 'kind/bug'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_APP_SECRETS: ${{ secrets.CAGENT_REVIEWER_APP_ID != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Generate GitHub App token
        if: env.HAS_APP_SECRETS == 'true'
        id: app-token
        continue-on-error: true
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        with:
          app_id: ${{ secrets.CAGENT_REVIEWER_APP_ID }}
          private_key: ${{ secrets.CAGENT_REVIEWER_APP_PRIVATE_KEY }}

      - name: Construct prompt
        id: prompt
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name).join(', ');

            const bugTemplate = [
              '## Bug Report Template (for reference)',
              '- Describe the bug',
              '- Version affected',
              '- How To Reproduce (steps)',
              '- Expected behavior',
              '- Screenshots (optional)',
              '- OS and Terminal type',
              '- Additional context',
            ].join('\n');

            const prompt = [
              `## Issue #${issue.number}: ${issue.title}`,
              '',
              `**Labels:** ${labels}`,
              `**Author:** ${issue.user.login}`,
              `**Created:** ${issue.created_at}`,
              '',
              '### Issue Body',
              '',
              issue.body || '(empty)',
              '',
              '---',
              '',
              bugTemplate,
              '',
              '---',
              '',
              `Triage this bug report. The issue number for gh CLI commands is ${issue.number}.`,
            ].join('\n');

            core.setOutput('text', prompt);

      - name: Run triage agent
        id: agent
        continue-on-error: true
        uses: docker/cagent-action@3a12dbd0c6cd7dda3d4e05f24f0143c9701456de # latest (v1.2.13)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        with:
          agent: ${{ github.workspace }}/.github/agents/issue-triager.yaml
          prompt: ${{ steps.prompt.outputs.text }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          timeout: 600

      - name: Parse agent result
        id: result
        shell: bash
        run: |
          OUTPUT_FILE="${{ steps.agent.outputs.output-file }}"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "No output file found"
            echo "action=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "--- Agent output ---"
          cat "$OUTPUT_FILE"
          echo "--------------------"

          # Search for the result marker anywhere in the output (LLMs often add trailing empty lines)
          # Use || true to prevent grep exit code 1 (no match) from failing the step under pipefail
          RESULT=$(grep -oE 'RESULT:(NEEDS_INFO|FIXED|NO_CHANGES)' "$OUTPUT_FILE" | tail -n 1 || true)
          if [[ "$RESULT" == "RESULT:NEEDS_INFO" ]]; then
            echo "action=needs_info" >> "$GITHUB_OUTPUT"
          elif [[ "$RESULT" == "RESULT:FIXED" ]]; then
            echo "action=fixed" >> "$GITHUB_OUTPUT"
          elif [[ "$RESULT" == "RESULT:NO_CHANGES" ]]; then
            echo "action=none" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No recognized result marker found in agent output"
            echo "action=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes
        if: steps.result.outputs.action == 'fixed'
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fix
        if: steps.result.outputs.action == 'fixed' && steps.changes.outputs.has_changes == 'true'
        id: push
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          BRANCH_NAME="fix/issue-${ISSUE_NUMBER}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "fix: auto-triage fix for #${ISSUE_NUMBER}

          Automated fix generated by issue triage agent.
          Resolves #${ISSUE_NUMBER}"

          git push origin "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create PR and comment on issue
        if: steps.push.outputs.branch != ''
        id: pr
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          BRANCH_NAME: ${{ steps.push.outputs.branch }}
        with:
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          script: |
            const issue = context.payload.issue;
            const branch = process.env.BRANCH_NAME;

            // Create PR
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: auto-triage fix for #${issue.number}`,
              body: [
                `## Summary`,
                ``,
                `Automated fix for #${issue.number}.`,
                ``,
                `> **${issue.title}**`,
                ``,
                `This PR was generated by the issue triage agent. Please review carefully before merging.`,
                ``,
                `## Test plan`,
                ``,
                `- [ ] Review the changes for correctness`,
                `- [ ] Verify tests pass in CI`,
                `- [ ] Manual testing if applicable`,
              ].join('\n'),
              head: branch,
              base: 'main',
              draft: false,
            });

            // Comment on the issue with the PR link
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                `I've analyzed this bug report and created an automated fix:`,
                ``,
                `**PR:** ${pr.data.html_url}`,
                ``,
                `Please review the changes — this was generated automatically and may need adjustments.`,
              ].join('\n'),
            });

            // Trigger AI review (auto-review won't run since the PR author is a bot,
            // not an org member — so we use the /review command instead)
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              body: '/review',
            });

            core.info(`Created PR #${pr.data.number}: ${pr.data.html_url}`);

      - name: Notify issue on failure
        if: failure() || (steps.result.outputs.action == 'fixed' && steps.changes.outputs.has_changes == 'true' && (steps.push.outcome == 'failure' || steps.pr.outcome == 'failure'))
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'I analyzed this bug report and attempted to create an automated fix, but encountered an error during the process. A maintainer will review this manually.',
            });
